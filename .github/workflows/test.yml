name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # scikit-build-core usually pulls these, but manual install ensures availability
          python -m pip install cmake ninja build

      - name: Build Wheel
        run: python -m build

      - name: Install swigbind11 project
        run: |
          # Install the generated wheel to test the actual build artifact
          python -m pip install dist/*.whl

      - name: Build and install
        run: |
          cd example
          pip install . -v

      - name: Run Pytest
        run: |
          cd example
          pytest
